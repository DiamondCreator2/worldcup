<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World Cup: Chaos 3D</title>
    <!-- Import Modern Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,700;0,900&display=swap" rel="stylesheet">
    <!-- Import Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0f1a;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #0a0f1a;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Modern UI Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 26, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            color: #ffffff;
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 5px;
            line-height: 1.2;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 4px 20px rgba(255, 255, 255, 0.2);
        }

        p.subtitle {
            font-size: 16px;
            color: #a0aabf;
            margin-bottom: 30px;
            max-width: 80%;
            line-height: 1.6;
            font-weight: 400;
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            width: 90%;
            max-width: 800px;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 10px;
        }

        /* Custom Scrollbar for Grids */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.5); }

        button {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            padding: 16px 20px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-bottom: 4px solid;
            background: #1c2436;
            color: #fff;
            text-transform: uppercase;
            border-radius: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            transform: translateY(-2px);
            background: #2a354d;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }
        
        button:active {
            transform: translateY(2px);
            border-bottom-width: 0px;
            margin-top: 4px;
        }

        .btn-cancel { background: #3d1c1c; border-color: #ff4444; }
        .btn-cancel:hover { background: #5a2626; }
        .btn-play { background: #1c3d1f; border-color: #44ff44; margin-top: 15px; }
        .btn-play:hover { background: #265a2b; }

        /* Mode Selection Buttons */
        .mode-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 600px;
        }

        /* Top Right Team Selector */
        #top-right-team {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(10, 15, 26, 0.85);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            z-index: 20;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        
        #top-right-team:hover {
            background: rgba(20, 30, 50, 0.95);
            transform: scale(1.05);
            border-color: #FFD700;
        }

        .tr-details {
            display: flex;
            flex-direction: column;
            text-align: right;
        }
        .tr-label { font-size: 10px; color: #a0aabf; font-weight: 700; text-transform: uppercase; }
        .tr-name { font-size: 14px; font-weight: 900; color: #fff; }
        .tr-edit { font-size: 12px; color: #FFD700; margin-left: 5px; }

        /* Custom Match Menu */
        .modal-box {
            background: rgba(15, 20, 35, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .modal-box h2 { margin: 0 0 10px 0; color: #FFD700; font-size: 24px; text-transform: uppercase; }
        
        .setting-row {
            display: flex;
            flex-direction: column;
            text-align: left;
            gap: 5px;
        }
        .setting-row span { font-weight: 700; font-size: 14px; display: flex; justify-content: space-between; }
        .setting-row span .val { color: #FFD700; }
        
        input[type="range"] {
            width: 100%;
            accent-color: #FFD700;
        }

        #opponents-list {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .opp-btn {
            padding: 10px;
            font-size: 12px;
            border-bottom: 2px solid;
            background: #232c40;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 5;
            font-size: 18px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            white-space: pre-line;
            color: #ffffff;
        }

        /* Leaderboard */
        #leaderboard {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(10, 15, 26, 0.75);
            backdrop-filter: blur(8px);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 10;
            min-width: 160px;
            pointer-events: none;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        #leaderboard h3 {
            margin: 0 0 10px 0;
            font-size: 14px;
            color: #FFD700;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            padding-bottom: 8px;
            font-weight: 900;
        }

        #leaderboard-list { list-style: none; padding: 0; margin: 0; }
        .lb-team { display: flex; align-items: center; margin-bottom: 8px; font-size: 13px; font-weight: 700; text-transform: uppercase; transition: all 0.3s; }
        .lb-color { width: 14px; height: 14px; border-radius: 50%; margin-right: 10px; border: 1px solid rgba(255,255,255,0.5); box-shadow: 0 0 4px rgba(0,0,0,0.5); flex-shrink: 0;}
        .lb-status { margin-left: auto; font-size: 11px; padding-left: 15px; font-weight: 900; }
        .team-safe { color: #4CAF50; }
        .team-playing { color: #ffffff; }
        .team-eliminated { color: #666666; text-decoration: line-through; }
        .team-eliminated .lb-color { filter: grayscale(100%); opacity: 0.4; }

        /* Audio Button */
        #audio-btn {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 15, 26, 0.85);
            backdrop-filter: blur(8px);
            border: 2px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 8px 15px;
            border-radius: 12px;
            cursor: pointer;
            z-index: 50;
            font-size: 18px;
            transition: all 0.2s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #audio-btn:hover { background: rgba(20, 30, 50, 0.95); border-color: #FFD700; transform: translateX(-50%) scale(1.05); }

        /* Center Announcements */
        #announcement-layer {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 15;
            text-shadow: 0 4px 15px rgba(0,0,0,0.8);
        }

        .pop-in { animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .fade-out { animation: fadeOut 0.5s forwards !important; }
        @keyframes popIn { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }
        @keyframes fadeOut { 0% { opacity: 1; transform: translate(-50%, -50%) scale(1); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1.1); } }

        #announcement-main { font-size: 64px; font-weight: 900; margin: 0; text-transform: uppercase; color: #fff; line-height: 1.1; }
        #announcement-sub { font-size: 20px; color: #FFD700; margin-top: 10px; font-weight: 700; text-transform: uppercase; }

        /* Mobile Controls */
        #joystick-zone {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255,255,255,0.5);
            z-index: 20;
            display: none;
            touch-action: none;
        }

        #joystick-knob {
            position: absolute;
            top: 50%; left: 50%; width: 40px; height: 40px;
            background: rgba(255, 255, 255, 0.8); border-radius: 50%;
            transform: translate(-50%, -50%); pointer-events: none;
        }

        #shoot-btn {
            position: absolute;
            bottom: 40px; right: 40px; width: 80px; height: 80px;
            border-radius: 50%; background: rgba(255, 50, 50, 0.3); border: 2px solid rgba(255,255,255,0.6);
            backdrop-filter: blur(4px); z-index: 20; display: none; color: white; font-size: 14px;
            font-family: 'Poppins', sans-serif; font-weight: 700; line-height: 80px; text-align: center;
            user-select: none; touch-action: none;
        }

        @media (max-width: 600px) {
            h1 { font-size: 32px; }
            .team-grid { grid-template-columns: repeat(2, 1fr); max-height: 45vh; }
            .mode-grid { grid-template-columns: 1fr; }
            button { font-size: 11px; padding: 12px 6px; }
            #announcement-main { font-size: 36px; }
            #announcement-sub { font-size: 14px; }
            #leaderboard { top: 10px; left: 10px; padding: 10px; min-width: 120px; }
            #leaderboard h3 { font-size: 12px; }
            .lb-team { font-size: 11px; margin-bottom: 6px;}
            .lb-color { width: 10px; height: 10px; }
            .lb-status { font-size: 9px; }
            #top-right-team { padding: 6px 10px; top: 10px; right: 10px; }
            .tr-name { font-size: 12px; }
            #audio-btn { top: 10px; padding: 5px 10px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div id="status-text"></div>
    </div>

    <!-- Audio Toggle -->
    <button id="audio-btn" onclick="audio.toggle(event)">
        <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon>
            <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path>
        </svg>
    </button>

    <!-- Leaderboard -->
    <div id="leaderboard" class="hidden">
        <h3>STANDINGS</h3>
        <ul id="leaderboard-list"></ul>
    </div>

    <!-- Center Announcements -->
    <div id="announcement-layer" class="hidden">
        <h2 id="announcement-main"></h2>
        <p id="announcement-sub"></p>
    </div>

    <!-- Top Right Selected Team -->
    <div id="top-right-team" onclick="openTeamSelect('player')" class="hidden">
        <div id="tr-color" class="lb-color"></div>
        <div class="tr-details">
            <span class="tr-label">Your Team</span>
            <span class="tr-name" id="tr-name">USA</span>
        </div>
        <span class="tr-edit">
            <svg viewBox="0 0 24 24" width="14" height="14" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
            </svg>
        </span>
    </div>

    <!-- Main Menu -->
    <div id="menu-screen" class="overlay">
        <h1>WORLD CUP<br>3D CHAOS</h1>
        <p class="subtitle">Use ARROWS to move. SPACE to Shoot. Run into enemies to Steal.</p>
        <div class="mode-grid">
            <button onclick="startMode('classic')">CLASSIC (4 Teams of 1)</button>
            <button onclick="startMode('duos')">DUOS (4 Teams of 2)</button>
            <button onclick="startMode('trios')">TRIOS (3 Teams of 3)</button>
            <button onclick="startMode('quads')">QUADS (3 Teams of 4)</button>
            <button onclick="startMode('ffa')">FREE FOR ALL (8 Teams of 1)</button>
            <button onclick="openCustomMenu()" style="border-color: #FFD700; color: #FFD700;">⚙ CUSTOM MATCH</button>
        </div>
    </div>

    <!-- Custom Match Settings Modal -->
    <div id="custom-modal" class="overlay hidden">
        <div class="modal-box">
            <h2>CUSTOM MATCH</h2>
            <div class="setting-row">
                <span>Total Teams: <span class="val" id="val-teams">4</span></span>
                <input type="range" id="slider-teams" min="2" max="8" value="4" oninput="updateCustomUI()">
            </div>
            <div class="setting-row">
                <span>Players per Team: <span class="val" id="val-players">1</span></span>
                <input type="range" id="slider-players" min="1" max="4" value="1" oninput="updateCustomUI()">
            </div>
            
            <h3 style="font-size: 12px; color: #a0aabf; margin: 10px 0 0 0;">OPPONENTS (Click to Change)</h3>
            <div id="opponents-list"></div>
            
            <button class="btn-play" onclick="startCustomMode()">PLAY MATCH</button>
            <button class="btn-cancel" onclick="closeCustomMenu()">CANCEL</button>
        </div>
    </div>

    <!-- Universal Team Selector Modal -->
    <div id="team-select-modal" class="overlay hidden" style="z-index: 50; background: rgba(0,0,0,0.95);">
        <h2 style="color: #fff; margin-bottom: 20px;">SELECT TEAM</h2>
        <div class="team-grid" id="team-selection">
            <!-- Buttons injected by JS -->
        </div>
        <button class="btn-cancel" onclick="closeTeamSelect()" style="margin-top: 20px; width: 200px;">BACK</button>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="overlay hidden">
        <h1 id="winner-text">TEAM WINS!</h1>
        <p class="subtitle" id="scorer-text">Scored the golden goal.</p>
        <button onclick="resetToMenu()" style="width: 250px; border-color: #FFD700; color: #FFD700;">MAIN MENU</button>
    </div>

    <!-- Mobile controls -->
    <div id="joystick-zone"><div id="joystick-knob"></div></div>
    <div id="shoot-btn">SHOOT</div>
</div>

<script>
    // --- SVG ICONS ---
    const svgVolumeOn = `<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>`;
    const svgVolumeOff = `<svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>`;

    // --- AUDIO SYSTEM (Web Audio API) ---
    const audio = {
        ctx: null, muted: false, musicInterval: null, lastDribble: 0,
        init: function() {
            if (this.ctx) return;
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.startMusic();
        },
        toggle: function(e) {
            if (e) e.stopPropagation();
            this.init();
            this.muted = !this.muted;
            document.getElementById('audio-btn').innerHTML = this.muted ? svgVolumeOff : svgVolumeOn;
        },
        playTone: function(freq, type, duration, vol=0.1, slideFreq=null) {
            if (!this.ctx || this.muted) return;
            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
            if (slideFreq) osc.frequency.exponentialRampToValueAtTime(slideFreq, this.ctx.currentTime + duration);
            gain.gain.setValueAtTime(vol, this.ctx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
            osc.connect(gain); gain.connect(this.ctx.destination);
            osc.start(); osc.stop(this.ctx.currentTime + duration);
        },
        playDribble: function() {
            const now = Date.now();
            if (now - this.lastDribble < 100) return; // Prevent spamming sound
            this.lastDribble = now;
            this.playTone(150, 'triangle', 0.1, 0.1, 50);
        },
        playShoot: function() { this.playTone(600, 'square', 0.3, 0.15, 100); },
        playSteal: function() { this.playTone(100, 'sawtooth', 0.2, 0.2, 40); },
        playWhistle: function() {
            this.playTone(1200, 'square', 0.15, 0.1);
            setTimeout(() => this.playTone(1400, 'square', 0.3, 0.15), 200);
        },
        playCheer: function() {
            setTimeout(() => this.playTone(523.25, 'square', 0.2, 0.1), 0); // C5
            setTimeout(() => this.playTone(659.25, 'square', 0.2, 0.1), 150); // E5
            setTimeout(() => this.playTone(783.99, 'square', 0.2, 0.1), 300); // G5
            setTimeout(() => this.playTone(1046.50, 'square', 0.4, 0.15), 450); // C6
        },
        startMusic: function() {
            const notes = [196, 0, 196, 261, 329, 0, 329, 261, 293, 0, 293, 349, 392, 0, 392, 349];
            let idx = 0;
            this.musicInterval = setInterval(() => {
                if(this.muted || gameState !== 'playing') return;
                const freq = notes[idx];
                if(freq > 0) this.playTone(freq/2, 'square', 0.15, 0.04); 
                idx = (idx + 1) % notes.length;
            }, 180);
        }
    };

    // Unlock audio context on first interaction
    document.body.addEventListener('click', () => audio.init(), { once: true });
    document.body.addEventListener('touchstart', () => audio.init(), { once: true });

    // --- THREE.JS SETUP ---
    const container = document.getElementById('game-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0f1a); 
    
    const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 1, 1000);
    camera.position.set(0, 350, 300);
    camera.lookAt(0, 0, -50); 

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    const ambientLight = new THREE.AmbientLight(0xffffff, 0.35); 
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xaabbff, 0.3); 
    dirLight.position.set(100, 200, 100);
    scene.add(dirLight);

    function createStadiumLight(x, z) {
        const spotLight = new THREE.SpotLight(0xffffff, 0.8, 800, Math.PI / 4, 0.4, 1);
        spotLight.position.set(x, 250, z);
        spotLight.lookAt(0, 0, 0);
        spotLight.castShadow = true;
        spotLight.shadow.mapSize.width = 1024;
        spotLight.shadow.mapSize.height = 1024;
        scene.add(spotLight);
        
        const bulbGeo = new THREE.SphereGeometry(4, 16, 16);
        const bulbMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const bulb = new THREE.Mesh(bulbGeo, bulbMat);
        bulb.position.set(x, 250, z);
        scene.add(bulb);
    }
    createStadiumLight(-250, -300); createStadiumLight(250, -300);
    createStadiumLight(-250, 300); createStadiumLight(250, 300);

    // --- GAME DIMENSIONS ---
    const V_WIDTH = 400;
    const V_HEIGHT = 500;
    function get3DX(logicalX) { return logicalX - (V_WIDTH / 2); }
    function get3DZ(logicalY) { return logicalY - (V_HEIGHT / 2); }

    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    // --- SCENERY SETUP ---
    function buildField() {
        const fieldGroup = new THREE.Group();

        const trackGeo = new THREE.PlaneGeometry(V_WIDTH + 140, V_HEIGHT + 140);
        const trackMat = new THREE.MeshStandardMaterial({ color: 0x8B3A3A, roughness: 0.9, metalness: 0.1 }); 
        const track = new THREE.Mesh(trackGeo, trackMat);
        track.rotation.x = -Math.PI / 2; track.position.set(0, -0.5, 0); track.receiveShadow = true;
        fieldGroup.add(track);

        const stripeDepth = 50; 
        const grassMat1 = new THREE.MeshStandardMaterial({ color: 0x2e7d32, roughness: 1.0 });
        const grassMat2 = new THREE.MeshStandardMaterial({ color: 0x276a2a, roughness: 1.0 });
        
        for (let y = 0; y < V_HEIGHT; y += stripeDepth) {
            const mat = (y / stripeDepth) % 2 === 0 ? grassMat1 : grassMat2;
            const stripeGeo = new THREE.PlaneGeometry(V_WIDTH, stripeDepth);
            const stripe = new THREE.Mesh(stripeGeo, mat);
            stripe.rotation.x = -Math.PI / 2; 
            stripe.position.set(0, 0, get3DZ(y + (stripeDepth / 2)));
            stripe.receiveShadow = true;
            fieldGroup.add(stripe);
        }

        const lineMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x444444, roughness: 0.5 });
        const lineOffset = 0.5;

        const borders = [

    class Entity {
        constructor(x, y, size, team, isAI = true, aiType = 'tactical') {
            this.x = x; this.y = y; this.size = size; 
            this.team = team; this.isAI = isAI; this.aiType = aiType; 
            this.vx = 0; this.vy = 0; this.speed = 0.7; this.friction = 0.8;
            this.isGoalie = false; this.wanderAngle = Math.random() * Math.PI * 2; 
            this.facingAngle = -Math.PI / 2; this.stealCooldown = 0; 

            this.mesh = this.createMesh();
            scene.add(this.mesh);
            this.updateMeshPosition();
        }

        createMesh() {
            const group = new THREE.Group();
            const shorts = new THREE.Mesh(new THREE.CylinderGeometry(5, 5, 8, 12), new THREE.MeshStandardMaterial({ color: this.team.color2, roughness: 0.7 }));
            shorts.position.y = 4; group.add(shorts);

            const shirt = new THREE.Mesh(new THREE.CylinderGeometry(5, 5, 10, 12), new THREE.MeshStandardMaterial({ color: this.team.color1, roughness: 0.7 }));
            shirt.position.y = 13; group.add(shirt);

            const head = new THREE.Mesh(new THREE.BoxGeometry(8, 8, 8), new THREE.MeshStandardMaterial({ color: 0xFFC1CC, roughness: 0.5 }));
            head.position.y = 22; group.add(head);

            // Yellow indicator for human player, Cyan indicator for teammates
            if (!this.isAI) {
                const marker = new THREE.Mesh(new THREE.ConeGeometry(4, 8, 4), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
                marker.position.y = 35; marker.rotation.x = Math.PI; group.add(marker);
            } else if (playerTeam && this.team.id === playerTeam.id) {
                const marker = new THREE.Mesh(new THREE.ConeGeometry(3, 6, 4), new THREE.MeshBasicMaterial({ color: 0x00ffff }));
                marker.position.y = 32; marker.rotation.x = Math.PI; group.add(marker);
            }
            return group;
        }

        update() {
            if (this.stealCooldown > 0) this.stealCooldown--;
            this.x += this.vx; this.y += this.vy;
            this.vx *= this.friction; this.vy *= this.friction;

            if (this.x < this.size/2) this.x = this.size/2;
            if (this.x > V_WIDTH - this.size/2) this.x = V_WIDTH - this.size/2;
            if (this.y < this.size/2) this.y = this.size/2;
            if (this.y > V_HEIGHT - this.size/2) this.y = V_HEIGHT - this.size/2;

            const goalLeft = V_WIDTH/2 - 60; const goalRight = V_WIDTH/2 + 60;
            if (this.y < 20 && this.x > goalLeft && this.x < goalRight && !this.isGoalie) this.y = 20; 

            if (this.isAI && gameState === 'playing') this.runAI();
            else if (!this.isAI && gameState === 'playing') this.handleInput();

            this.checkBallCollision();
            this.updateMeshPosition();
        }

        updateMeshPosition() {
            this.mesh.position.set(get3DX(this.x), 0, get3DZ(this.y));
            if (Math.abs(this.vx) > 0.1 || Math.abs(this.vy) > 0.1) {
                this.facingAngle = Math.atan2(this.vy, this.vx); 
                this.mesh.rotation.y = Math.atan2(this.vx, this.vy);
            }
        }

        handleInput() {
            let dx = 0; let dy = 0;
            if (keys.ArrowUp || keys.w) dy -= 1;
            if (keys.ArrowDown || keys.s) dy += 1;
            if (keys.ArrowLeft || keys.a) dx -= 1;
            if (keys.ArrowRight || keys.d) dx += 1;

            if (joystickVector.x !== 0 || joystickVector.y !== 0) { dx = joystickVector.x; dy = joystickVector.y; }

            if (dx !== 0 || dy !== 0) {
                const len = Math.sqrt(dx*dx + dy*dy);
                let currentSpeed = this.speed;
                if (ball && ball.possessedBy === this) currentSpeed *= 0.6; 
                this.vx += (dx / len) * currentSpeed * 0.4;
                this.vy += (dy / len) * currentSpeed * 0.4;
            }

            if (keys[' ']) { shootBall(this); keys[' '] = false; }
        }

        runAI() {
            if (!ball) return;
            const goalX = V_WIDTH / 2; const goalY = 20;

            // AI Teammate Support & Getting Open Logic
            if (ball.possessedBy && ball.possessedBy.team === this.team && ball.possessedBy !== this) {
                let targetX = goalX; 
                let targetY = ball.possessedBy.y - 80; // Push upfield ahead of the ball
                
                // Spread out wide
                let sideOffset = this.x < ball.possessedBy.x ? -60 : 60;
                targetX = ball.possessedBy.x + sideOffset;

                // Keep within bounds
                if (targetX < 20) targetX = 20; if (targetX > V_WIDTH - 20) targetX = V_WIDTH - 20;
                if (targetY < 40) targetY = 40; if (targetY > V_HEIGHT - 20) targetY = V_HEIGHT - 20;

                let dxToSpace = targetX - this.x; let dyToSpace = targetY - this.y;
                let dist = Math.sqrt(dxToSpace*dxToSpace + dyToSpace*dyToSpace);

                // Evade nearby defenders to "get open"
                let evadeX = 0; let evadeY = 0;
                for (let opp of entities) {
                    if (opp.team !== this.team && !opp.isGoalie) {
                        let dX = this.x - opp.x; let dY = this.y - opp.y;
                        let oppDist = Math.sqrt(dX*dX + dY*dY);
                        if (oppDist < 50 && oppDist > 0) {
                            evadeX += dX / oppDist; evadeY += dY / oppDist;
                        }
                    }
                }

                let moveX = 0; let moveY = 0;
                if (dist > 0) {
                    moveX = (dxToSpace/dist) + (evadeX * 1.5);
                    moveY = (dyToSpace/dist) + (evadeY * 1.5);
                }

                let moveDist = Math.sqrt(moveX*moveX + moveY*moveY);
                if (moveDist > 0) {
                    this.vx += (moveX/moveDist) * this.speed * 0.25;
                    this.vy += (moveY/moveDist) * this.speed * 0.25;
                }
                return;
            }

            // Dribbling, Shooting, and Passing Logic
            if (ball.possessedBy === this) {
                let dxToGoal = goalX - this.x; let dyToGoal = goalY - this.y;
                let distToGoal = Math.sqrt(dxToGoal*dxToGoal + dyToGoal*dyToGoal);
                
                // Shoot if close to goal
                if (distToGoal < 120) {
                    this.facingAngle = Math.atan2(dyToGoal, dxToGoal);
                    shootBall(this);
                    return;
                }
                
                // Look for an open pass (Check periodically to avoid robotic instant-passing)
                if (Math.random() < 0.1) {
                    let bestTarget = null;
                    let bestScore = -999;

                    for (let e of entities) {
                        if (e !== this && e.team === this.team && !e.isGoalie) {
                            let eDistToGoal = Math.sqrt((goalX - e.x)**2 + (goalY - e.y)**2);
                            // Pass forward or sideways, not backwards (unless very blocked, but let's keep it simple)
                            if (eDistToGoal < distToGoal + 10) { 
                                let laneOpen = true;
                                for (let opp of entities) {
                                    if (opp.team !== this.team && !opp.isGoalie) {
                                        let distToLine = pointToLineDistance(opp.x, opp.y, this.x, this.y, e.x, e.y);
                                        // If an opponent is within 25 units of the pass trajectory, the lane is blocked
                                        if (distToLine < 25) { laneOpen = false; break; }
                                    }
                                }
                                if (laneOpen) {
                                    // Heavily prefer passing to the human player!
                                    let score = -eDistToGoal + (!e.isAI ? 200 : 0);
                                    if (score > bestScore) { bestScore = score; bestTarget = e; }
                                }
                            }
                        }
                    }

                    if (bestTarget) {
                        let dx = bestTarget.x - this.x; let dy = bestTarget.y - this.y;
                        this.facingAngle = Math.atan2(dy, dx);
                        passBall(this);
                        return;
                    }
                }

                // Drive towards the goal if no pass is open
                if (distToGoal > 0) {
                    this.vx += (dxToGoal / distToGoal) * this.speed * 0.35;
                    this.vy += (dyToGoal / distToGoal) * this.speed * 0.35;
                }
                return; 
            }

            let dx = ball.x - this.x; let dy = ball.y - this.y;
            const distToBall = Math.sqrt(dx*dx + dy*dy);
            let targetX, targetY;

            this.wanderAngle += (Math.random() - 0.5) * 0.3;
            const wanderX = Math.cos(this.wanderAngle) * 0.6;
            const wanderY = Math.sin(this.wanderAngle) * 0.6;

            if (this.aiType === 'aggressive') { targetX = dx; targetY = dy; } 
            else if (this.aiType === 'camper') {
                // Move the "camper" up to midfield so they don't get stuck in the back
                if (distToBall < 180 || ball.y > this.y) { targetX = dx; targetY = dy; } 
                else { targetX = ball.x - this.x; targetY = (V_HEIGHT * 0.4) - this.y; }
            } else {
                // Tactical (Default)
                if (this.y < ball.y - 5 && ball.y < V_HEIGHT - 35) {
                    let sideOffset = this.x < ball.x ? -35 : 35; 
                    let desiredX = ball.x + sideOffset; 
                    let desiredY = ball.y + 25;
                    
                    // If the ball is pinned against the back wall, swoop in from the side instead of going behind
                    if (ball.y > V_HEIGHT - 30) {
                        desiredY = ball.y; 
                        desiredX = ball.x + (this.x < ball.x ? -25 : 25);
                    }

                    if (desiredX < 20) desiredX = 20; if (desiredX > V_WIDTH - 20) desiredX = V_WIDTH - 20;
                    if (desiredY > V_HEIGHT - 20) desiredY = V_HEIGHT - 20;
                    
                    targetX = desiredX - this.x; targetY = desiredY - this.y;
                } else { targetX = dx; targetY = dy; }
            }

            const len = Math.sqrt(targetX*targetX + targetY*targetY);
            if (len > 0) {
                let moveX = (targetX / len) + wanderX; let moveY = (targetY / len) + wanderY;
                const moveLen = Math.sqrt(moveX*moveX + moveY*moveY);
                let currentSpeed = this.speed;
                if (ball && ball.possessedBy === this) currentSpeed *= 0.6;
                this.vx += (moveX / moveLen) * currentSpeed * 0.25;
                this.vy += (moveY / moveLen) * currentSpeed * 0.25;
            }
        }

        checkBallCollision() {
            if (!ball) return;
            let distX = Math.abs(ball.x - this.x); let distY = Math.abs(ball.y - this.y);
            if (distX > (this.size/2 + ball.radius)) return;
            if (distY > (this.size/2 + ball.radius)) return;
            if (distX <= (this.size/2) || distY <= (this.size/2)) { resolveCollision(this, ball); return; } 
            let dx = distX - this.size/2; let dy = distY - this.size/2;
            if (dx*dx + dy*dy <= (ball.radius*ball.radius)) resolveCollision(this, ball);
        }
    }

            const leftGlove = new THREE.Mesh(gloveGeo, gloveMat); leftGlove.position.set(-10, 8, 2); group.add(leftGlove);
            const rightGlove = new THREE.Mesh(gloveGeo, gloveMat); rightGlove.position.set(10, 8, 2); group.add(rightGlove);

        }

        updateMeshPosition() {
            this.mesh.position.set(get3DX(this.x), 0, get3DZ(this.y));

        runAI() {
            if (!ball) return;
            let targetX = ball.x;
            const goalLeft = V_WIDTH/2 - 50; const goalRight = V_WIDTH/2 + 50;
            if (targetX < goalLeft) targetX = goalLeft; if (targetX > goalRight) targetX = goalRight;

            let targetY = this.startY;
            let ballInZone = (ball.y < 160 && ball.x > goalLeft - 40 && ball.x < goalRight + 40);
            
            if (ballInZone) {
                if (!this.wasBallInZone) this.isCharging = Math.random() > 0.4; 
                this.wasBallInZone = true;
            } else { this.wasBallInZone = false; this.isCharging = false; }

            if (this.isCharging) {
                targetY = Math.max(20, ball.y - 15); 
                if (targetY > 120) targetY = 120; 
            }

            let dx = targetX - this.x; let dy = targetY - this.y;
            if (Math.abs(dx) > 5) this.vx += Math.sign(dx) * this.speed * 0.4; else this.vx *= 0.5;
            if (Math.abs(dy) > 5) this.vy += Math.sign(dy) * this.speed * 0.4; else this.vy *= 0.5;
        }
    }

    class Ball {
        constructor(x, y) {
            this.x = x; this.y = y; this.radius = 6; this.vx = 0; this.vy = 0; this.friction = 0.96;
            this.possessedBy = null; this.possessionCooldown = 0; 
            
            this.mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(this.radius, 1), new THREE.MeshLambertMaterial({ color: 0xffffff }));
            this.mesh.castShadow = true; scene.add(this.mesh);
            this.updateMeshPosition();
        }

        update() {
            if (this.possessionCooldown > 0) this.possessionCooldown--;

            if (this.possessedBy) {
                const offset = 14; 
                this.x = this.possessedBy.x + Math.cos(this.possessedBy.facingAngle) * offset;
                this.y = this.possessedBy.y + Math.sin(this.possessedBy.facingAngle) * offset;
                this.vx = this.possessedBy.vx; this.vy = this.possessedBy.vy;
            } else {
                this.x += this.vx; this.y += this.vy;
                this.vx *= this.friction; this.vy *= this.friction;

                if (this.x < this.radius) { this.x = this.radius; this.vx *= -0.8; audio.playDribble(); }
                if (this.x > V_WIDTH - this.radius) { this.x = V_WIDTH - this.radius; this.vx *= -0.8; audio.playDribble(); }
                if (this.y > V_HEIGHT - this.radius) { this.y = V_HEIGHT - this.radius; this.vy *= -0.8; audio.playDribble(); }
                
                const goalLeft = V_WIDTH/2 - 60; const goalRight = V_WIDTH/2 + 60;
                if (this.y < this.radius) {
                    if (this.x > goalLeft && this.x < goalRight) {
                        if (gameState === 'playing') handleGoal();
                        if (this.y < -12) { this.y = -12; this.vy *= -0.5; }
                    } else { this.y = this.radius; this.vy *= -0.8; }
                }
            }
            this.updateMeshPosition();
        }

        updateMeshPosition() {
            this.mesh.position.set(get3DX(this.x), this.radius, get3DZ(this.y));
            this.mesh.rotation.x += this.vy * 0.1; this.mesh.rotation.z -= this.vx * 0.1;
        }
    }

    // --- PHYSICS HELPERS ---
    
    // Calculates distance from a point (px,py) to a line segment (x1,y1) -> (x2,y2)
    function pointToLineDistance(px, py, x1, y1, x2, y2) {
        let A = px - x1; let B = py - y1; let C = x2 - x1; let D = y2 - y1;
        let dot = A * C + B * D; let len_sq = C * C + D * D; let param = -1;
        if (len_sq !== 0) param = dot / len_sq;
        let xx, yy;
        if (param < 0) { xx = x1; yy = y1; } else if (param > 1) { xx = x2; yy = y2; } else { xx = x1 + param * C; yy = y1 + param * D; }
        let dx = px - xx; let dy = py - yy;
        return Math.sqrt(dx * dx + dy * dy);
    }

    function passBall(entity) {
        if (!ball || ball.possessedBy !== entity) return;
        ball.possessedBy = null; ball.possessionCooldown = 20; 
        const passPower = 6.5; // Passes are slightly softer than shots
        ball.vx = Math.cos(entity.facingAngle) * passPower + entity.vx * 0.5;
        ball.vy = Math.sin(entity.facingAngle) * passPower + entity.vy * 0.5;
        audio.playShoot();
    }

    function shootBall(entity) {
        if (!ball || ball.possessedBy !== entity) return;

        // Try to find a teammate in the general direction of facingAngle
        let bestTeammate = null;
        let maxDot = 0.707; // Cosine of 45 degrees (total 90-degree target angle cone)
        const facingX = Math.cos(entity.facingAngle);
        const facingY = Math.sin(entity.facingAngle);

        for (let e of entities) {
            if (e !== entity && e.team.id === entity.team.id && !e.isGoalie) {
                let dx = e.x - entity.x;
                let dy = e.y - entity.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 0 && dist < 250) {
                    let dot = (dx * facingX + dy * facingY) / dist; // Normalized dot product
                    if (dot > maxDot) {
                        maxDot = dot;
                        bestTeammate = e;
                    }
                }
            }
        }

        ball.possessedBy = null;
        ball.possessionCooldown = 20;

        if (bestTeammate) {
            // Lead pass predicting teammate momentum (15 frames prediction)
            const leadFactor = 15;
            const targetX = bestTeammate.x + bestTeammate.vx * leadFactor;
            const targetY = bestTeammate.y + bestTeammate.vy * leadFactor;

            const dx = targetX - entity.x;
            const dy = targetY - entity.y;
            const dist = Math.sqrt(dx*dx + dy*dy);
            
            const passAngle = Math.atan2(dy, dx);
            const passPower = Math.min(8.5, Math.max(6.0, dist * 0.04)); 
            
            ball.vx = Math.cos(passAngle) * passPower + entity.vx * 0.3;
            ball.vy = Math.sin(passAngle) * passPower + entity.vy * 0.3;
            audio.playShoot();
        } else {
            // Trigger raw shot if no teammate is ahead/nearby in that direction
            const shotPower = 8.5; 
            ball.vx = Math.cos(entity.facingAngle) * shotPower + entity.vx * 0.5;
            ball.vy = Math.sin(entity.facingAngle) * shotPower + entity.vy * 0.5;
            audio.playShoot();
        }
    }

    function resolveCollision(entity, ball) {
        if (ball.possessionCooldown > 0 || entity.stealCooldown > 0 || ball.possessedBy === entity) return;
        if (!entity.isGoalie) { lastTouchedBy = entity.team; ball.possessedBy = entity; audio.playDribble(); } 
        else { ball.possessedBy = null; ball.possessionCooldown = 15; ball.vy = 6; ball.vx = (Math.random() - 0.5) * 4; audio.playShoot(); }
    }


    // --- MENU / UI LOGIC ---
    function initMenu() {
        // Setup Grid
        const grid = document.getElementById('team-selection');
        grid.innerHTML = '';
        TEAMS.forEach(team => {
            const btn = document.createElement('button');
            btn.innerHTML = `<div class="lb-color" style="background:${team.color1}; margin:0;"></div> ${team.name}`;
            btn.style.borderColor = team.color1;
            btn.onclick = () => selectTeam(team);
            grid.appendChild(btn);
        });

        // Set initial random player team
        if (!playerTeam) {
            playerTeam = TEAMS[Math.floor(Math.random() * TEAMS.length)];
            updateTopRightUI();
        }
        document.getElementById('top-right-team').classList.remove('hidden');

        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            document.getElementById('joystick-zone').style.display = 'block';
            document.getElementById('shoot-btn').style.display = 'block';
            setupJoystick();
        }
    }

    function updateTopRightUI() {
        document.getElementById('tr-name').innerText = playerTeam.name;
        document.getElementById('tr-color').style.backgroundColor = playerTeam.color1;
    }

    function openTeamSelect(target) {
        teamSelectTarget = target;
        document.getElementById('team-select-modal').classList.remove('hidden');
    }

    function closeTeamSelect() {
        document.getElementById('team-select-modal').classList.add('hidden');
    }

    function selectTeam(team) {
        if (teamSelectTarget === 'player') {
            playerTeam = team;
            updateTopRightUI();
        } else if (typeof teamSelectTarget === 'number') {
            customOpponentTeams[teamSelectTarget] = team;
            updateCustomUI(); // Refresh slots
        }
        closeTeamSelect();
    }

    // --- GAME MODES ---
    function startMode(modeStr) {
        let tCount = 4;
        let pCount = 1;
        
        if (modeStr === 'classic') { tCount = 4; pCount = 1; }
        else if (modeStr === 'duos') { tCount = 4; pCount = 2; }
        else if (modeStr === 'trios') { tCount = 3; pCount = 3; }
        else if (modeStr === 'quads') { tCount = 3; pCount = 4; }
        else if (modeStr === 'ffa') { tCount = 8; pCount = 1; }

        currentPlayersPerTeam = pCount;
        
        // Random opponents
        const opponentsPool = TEAMS.filter(t => t.id !== playerTeam.id).sort(() => 0.5 - Math.random());
        activeTeams = [playerTeam, ...opponentsPool.slice(0, tCount - 1)];
        
        launchTournament();
    }

    // --- CUSTOM MATCH LOGIC ---
    function openCustomMenu() {
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('top-right-team').classList.add('hidden');
        document.getElementById('custom-modal').classList.remove('hidden');
        
        // Initialize custom opponents if empty
        const desiredOpponents = parseInt(document.getElementById('slider-teams').value) - 1;
        if (customOpponentTeams.length !== desiredOpponents) {
            const pool = TEAMS.filter(t => t.id !== playerTeam.id).sort(() => 0.5 - Math.random());
            customOpponentTeams = pool.slice(0, desiredOpponents);
        }
        updateCustomUI();
    }

    function closeCustomMenu() {
        document.getElementById('custom-modal').classList.add('hidden');
        document.getElementById('menu-screen').classList.remove('hidden');
        document.getElementById('top-right-team').classList.remove('hidden');
    }

    function updateCustomUI() {
        const tCount = parseInt(document.getElementById('slider-teams').value);
        const pCount = parseInt(document.getElementById('slider-players').value);
        
        document.getElementById('val-teams').innerText = tCount;
        document.getElementById('val-players').innerText = pCount;

        // Adjust opponent array
        const oppCount = tCount - 1;
        while(customOpponentTeams.length < oppCount) {
            const pool = TEAMS.filter(t => t.id !== playerTeam.id && !customOpponentTeams.includes(t));
            customOpponentTeams.push(pool[Math.floor(Math.random() * pool.length)]);
        }
        if(customOpponentTeams.length > oppCount) {
            customOpponentTeams.length = oppCount;
        }

        // Render slots
        const list = document.getElementById('opponents-list');
        list.innerHTML = '';
        customOpponentTeams.forEach((team, idx) => {
            const btn = document.createElement('button');
            btn.className = 'opp-btn';
            btn.style.borderColor = team.color1;
            btn.innerHTML = `<div class="lb-color" style="background:${team.color1}; margin:0;"></div> ${team.id}`;
            btn.onclick = () => openTeamSelect(idx);
            list.appendChild(btn);
        });
    }

    function startCustomMode() {
        currentPlayersPerTeam = parseInt(document.getElementById('slider-players').value);
        activeTeams = [playerTeam, ...customOpponentTeams];
        closeCustomMenu();
        launchTournament();
    }


    // --- TOURNAMENT LOGIC ---
    function launchTournament() {
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('top-right-team').classList.add('hidden');
        document.getElementById('game-over-screen').classList.add('hidden');
        document.getElementById('leaderboard').classList.remove('hidden');
        
        safeTeams = [];
        eliminatedTeams = [];
        tournamentRound = 1;
        
        camera.position.set(0, 480, 450);
        startRound();
    }

    function startRound() {
        clearEntities();
        
        const aiPersonalities = ['aggressive', 'camper', 'tactical'];

        // Spawn teams with multiple entities
        activeTeams.forEach((team, teamIdx) => {
            const baseX = (V_WIDTH / (activeTeams.length + 1)) * (teamIdx + 1);
            const baseY = V_HEIGHT - 80;
            
            for(let i = 0; i < currentPlayersPerTeam; i++) {
                const isPlayer = (team.id === playerTeam.id && i === 0);
                
                // Spread players on the same team slightly
                const offsetX = (i % 2 === 0 ? 1 : -1) * Math.floor((i+1) / 2) * 15;
                const offsetY = Math.floor(i / 2) * -15; 
                
                entities.push(new Entity(baseX + offsetX, baseY + offsetY, 20, team, !isPlayer, aiPersonalities[i % 3]));
            }
        });

        goalie = new Goalie();
        entities.push(goalie);

        ball = new Ball(V_WIDTH/2, V_HEIGHT/2);
        lastTouchedBy = null;

        updateLeaderboard(); 

        let remainingNames = activeTeams.map(t => t.name).join(' vs ');
        if (activeTeams.length > 3) remainingNames = `${activeTeams.length} TEAMS REMAINING`;
        showAnnouncement(`ROUND ${tournamentRound}`, remainingNames, '#FFD700', 2500);
        
        audio.playWhistle();
        gameState = 'playing';
    }

    function handleGoal() {
        let scoringTeam = null;
        if (lastTouchedBy) {
            scoringTeam = activeTeams.find(t => t.id === lastTouchedBy.id);
        }
        if (!scoringTeam) {
            scoringTeam = activeTeams[Math.floor(Math.random() * activeTeams.length)];
        }

        gameState = 'scored'; 
        spawnConfetti();
        audio.playCheer();
        
        activeTeams = activeTeams.filter(t => t.id !== scoringTeam.id);
        safeTeams.push(scoringTeam);
        
        updateLeaderboard(); 

        let remainingMsg = `${activeTeams.length} TEAM${activeTeams.length > 1 ? 'S' : ''} LEFT TO QUALIFY`;
        showAnnouncement(`${scoringTeam.name} SCORES!`, remainingMsg, scoringTeam.color1, 2500);

        if (activeTeams.length === 1) {
            const eliminated = activeTeams[0];
            activeTeams = []; 
            eliminatedTeams.push(eliminated);
            
            setTimeout(() => {
                updateLeaderboard(); 
                showAnnouncement(`${eliminated.name} ELIMINATED!`, "KNOCKED OUT OF THE TOURNAMENT", "#ff3333", 3000);
                
                if (safeTeams.length === 1) {
                    setTimeout(() => triggerGameOver(safeTeams[0]), 3500);
                } else {
                    tournamentRound++;
                    activeTeams = [...safeTeams];
                    safeTeams = [];
                    setTimeout(startRound, 3500);
                }
            }, 3000);
        } else {
            setTimeout(startRound, 3000);
        }
    }

    function spawnConfetti() {
        const colors = [0xff0000, 0x00ff00, 0x0000ff, 0xffff00, 0xff00ff, 0x00ffff, 0xffffff];
        const goalW = 120;
        for (let i = 0; i < 200; i++) {
            const p = new THREE.Mesh(new THREE.PlaneGeometry(2, 4), new THREE.MeshBasicMaterial({ color: colors[Math.floor(Math.random() * colors.length)], side: THREE.DoubleSide }));
            p.position.set((Math.random() - 0.5) * goalW, 40 + Math.random() * 20, get3DZ(-10) + (Math.random() - 0.5) * 20);
            p.userData = { vx: (Math.random() - 0.5) * 4, vy: Math.random() * 6 + 2, vz: (Math.random() - 0.5) * 4, rx: (Math.random() - 0.5) * 0.5, ry: (Math.random() - 0.5) * 0.5, rz: (Math.random() - 0.5) * 0.5 };
            scene.add(p); confettiParticles.push(p);
        }
    }

    function updateConfetti() {
        for (let i = confettiParticles.length - 1; i >= 0; i--) {
            let p = confettiParticles[i]; let data = p.userData;
            data.vy -= 0.15; data.vx *= 0.98; data.vz *= 0.98;
            p.position.x += data.vx; p.position.y += data.vy; p.position.z += data.vz;
            p.rotation.x += data.rx; p.rotation.y += data.ry; p.rotation.z += data.rz;
            if (p.position.y <= 1) { p.position.y = 1; data.vy *= -0.5; data.vx *= 0.8; data.vz *= 0.8; }
        }
    }

    function clearEntities() {
        entities.forEach(e => scene.remove(e.mesh));
        if (ball) scene.remove(ball.mesh);
        entities = []; ball = null;
        confettiParticles.forEach(p => scene.remove(p)); confettiParticles = [];
    }

    function showAnnouncement(mainText, subText, mainColor = '#ffffff', duration = 2000) {
        const layer = document.getElementById('announcement-layer');
        const mainEl = document.getElementById('announcement-main');
        const subEl = document.getElementById('announcement-sub');
        mainEl.innerText = mainText; mainEl.style.color = mainColor; subEl.innerText = subText;
        layer.classList.remove('hidden', 'fade-out'); layer.classList.add('pop-in');
        
        if (duration > 0) {
            setTimeout(() => {
                layer.classList.remove('pop-in'); layer.classList.add('fade-out');
                setTimeout(() => layer.classList.add('hidden'), 500);
            }, duration);
        }
    }

    function updateLeaderboard() {
        const list = document.getElementById('leaderboard-list');
        list.innerHTML = '';
        let sortedTeams = [];
        safeTeams.forEach(t => sortedTeams.push({team: t, status: 'SAFE', class: 'team-safe'}));
        activeTeams.forEach(t => sortedTeams.push({team: t, status: 'PLAY', class: 'team-playing'}));
        eliminatedTeams.forEach(t => sortedTeams.push({team: t, status: 'OUT', class: 'team-eliminated'}));
        
        sortedTeams.forEach(item => {
            const li = document.createElement('li'); li.className = `lb-team ${item.class}`;
            li.innerHTML = `<div class="lb-color" style="background-color: ${item.team.color1};"></div><span>${item.team.id}</span><span class="lb-status">${item.status}</span>`;
            list.appendChild(li);
        });
    }

    function triggerGameOver(winnerTeam) {
        gameState = 'gameover';
        const winnerScreen = document.getElementById('game-over-screen');
        winnerScreen.classList.remove('hidden');
        document.getElementById('winner-text').innerText = `${winnerTeam.name} WINS!`;
        document.getElementById('winner-text').style.color = winnerTeam.color1;
        document.getElementById('scorer-text').innerText = (winnerTeam.id === playerTeam.id) ? "You are the ultimate champion!" : "You were eliminated.";
    }

    function resetToMenu() {
        gameState = 'menu';
        document.getElementById('game-over-screen').classList.add('hidden');
        document.getElementById('menu-screen').classList.remove('hidden');
        document.getElementById('leaderboard').classList.add('hidden');
        document.getElementById('top-right-team').classList.remove('hidden');
        clearEntities();
    }

    // --- MAIN RENDER LOOP ---
    function gameLoop() {
        if (gameState === 'playing' || gameState === 'scored') {
            entities.forEach(e => e.update());
            if (ball) ball.update();

            // Resolve overlapping entities
            for (let i = 0; i < entities.length; i++) {
                for (let j = i + 1; j < entities.length; j++) {
                    let e1 = entities[i]; let e2 = entities[j];
                    let dx = e2.x - e1.x; let dy = e2.y - e1.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    let minDist = (e1.size + e2.size)/2;
                    
                    if (dist < minDist && dist > 0) {
                        let overlap = minDist - dist; let nx = dx/dist; let ny = dy/dist;
                        e1.x -= nx * overlap * 0.1; e1.y -= ny * overlap * 0.1;
                        e2.x += nx * overlap * 0.1; e2.y += ny * overlap * 0.1;

                        // Stealing Mechanics (Only from opposing teams)
                        if (ball && e1.team !== e2.team) {
                            if (ball.possessedBy === e1 && e2.stealCooldown === 0 && !e2.isGoalie) {
                                ball.possessedBy = e2; e1.stealCooldown = 60; lastTouchedBy = e2.team; audio.playSteal();
                            } else if (ball.possessedBy === e2 && e1.stealCooldown === 0 && !e1.isGoalie) {
                                ball.possessedBy = e1; e2.stealCooldown = 60; lastTouchedBy = e1.team; audio.playSteal();
                            }
                        }
                    }
                }
            }
        }

        if (confettiParticles.length > 0) updateConfetti();

        if (gameState !== 'menu') {
            let targetCamY = 420; let targetCamZ = 380; let targetLookZ = 20;
            if (ball) {
                const t = Math.max(0, Math.min(1, ball.y / V_HEIGHT));
                targetCamY = 220 + (t * 200); targetCamZ = 180 + (t * 200); targetLookZ = -80 + (t * 100); 
            }
            camera.position.y += (targetCamY - camera.position.y) * 0.04;
            camera.position.z += (targetCamZ - camera.position.z) * 0.04;
            currentLookZ += (targetLookZ - currentLookZ) * 0.04;
            camera.lookAt(0, 0, currentLookZ);
        } else {
            camera.position.set(0, 350, 300); camera.lookAt(0, 0, -50); currentLookZ = -50;
        }

        renderer.render(scene, camera);
        requestAnimationFrame(gameLoop);
    }

    // --- INPUT ---
    window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; });
    window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });

    function setupJoystick() {
        const zone = document.getElementById('joystick-zone'); const knob = document.getElementById('joystick-knob');
        let active = false; let center = {x:0, y:0}; const maxDist = 40;

        zone.addEventListener('touchstart', (e) => { active = true; const rect = zone.getBoundingClientRect(); center = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 }; updateKnob(e.touches[0]); }, {passive: false});
        zone.addEventListener('touchmove', (e) => { if (!active) return; e.preventDefault(); updateKnob(e.touches[0]); }, {passive: false});
        const resetJoy = () => { active = false; joystickVector = {x: 0, y: 0}; knob.style.transform = `translate(-50%, -50%)`; };
        zone.addEventListener('touchend', resetJoy); zone.addEventListener('touchcancel', resetJoy);

        const shootBtn = document.getElementById('shoot-btn');
        shootBtn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[' '] = true; }, {passive: false});
        shootBtn.addEventListener('touchend', (e) => { e.preventDefault(); keys[' '] = false; });

        function updateKnob(touch) {
            let dx = touch.clientX - center.x; let dy = touch.clientY - center.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > maxDist) { dx = (dx/dist) * maxDist; dy = (dy/dist) * maxDist; }
            knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            if (dist > 5) joystickVector = { x: dx/maxDist, y: dy/maxDist }; else joystickVector = {x: 0, y: 0};
        }
    }

    initMenu();
    requestAnimationFrame(gameLoop);

</script>
