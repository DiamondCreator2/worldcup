<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>World Cup: Chaos 3D</title>
    <!-- Import Modern Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,700;0,900&display=swap" rel="stylesheet">
    <!-- Import Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0f1a;
            color: #fff;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background-color: #0a0f1a;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Modern UI Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 26, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            color: #ffffff;
            font-size: 48px;
            font-weight: 900;
            margin-bottom: 10px;
            line-height: 1.2;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 4px 20px rgba(255, 255, 255, 0.2);
        }

        p.subtitle {
            font-size: 16px;
            color: #a0aabf;
            margin-bottom: 40px;
            max-width: 80%;
            line-height: 1.6;
            font-weight: 400;
        }

        .team-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            width: 80%;
            max-width: 500px;
        }

        button {
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            padding: 16px 20px;
            font-size: 14px;
            cursor: pointer;
            border: none;
            border-bottom: 4px solid;
            background: #1c2436;
            color: #fff;
            text-transform: uppercase;
            border-radius: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        button:hover {
            transform: translateY(-2px);
            background: #2a354d;
            box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }
        
        button:active {
            transform: translateY(2px);
            border-bottom-width: 0px;
            margin-top: 4px;
        }

        #ui-layer {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            text-align: center;
            pointer-events: none;
            z-index: 5;
            font-size: 18px;
            font-weight: 700;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            white-space: pre-line;
            color: #ffffff;
        }

        /* Mobile Controls */
        #joystick-zone {
            position: absolute;
            bottom: 20px;
            left: 20px;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255,255,255,0.5);
            z-index: 20;
            display: none; /* Shown on touch */
            touch-action: none;
        }

        #joystick-knob {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        #shoot-btn {
            position: absolute;
            bottom: 40px;
            right: 40px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: rgba(255, 50, 50, 0.3);
            border: 2px solid rgba(255,255,255,0.6);
            backdrop-filter: blur(4px);
            z-index: 20;
            display: none; /* Shown on touch */
            color: white;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            line-height: 80px;
            text-align: center;
            user-select: none;
            touch-action: none;
        }

        @media (max-width: 600px) {
            h1 { font-size: 32px; }
            .team-grid { grid-template-columns: 1fr; gap: 10px; }
            button { font-size: 12px; padding: 12px 10px; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="ui-layer">
        <div id="status-text"></div>
    </div>

    <!-- Main Menu -->
    <div id="menu-screen" class="overlay">
        <h1>WORLD CUP<br>3D CHAOS</h1>
        <p class="subtitle">One goal. One Goalie. 4 Teams fighting to score first.<br><br>Use ARROWS to move. SPACE to Shoot. Run into players to Steal.</p>
        <div class="team-grid" id="team-selection">
            <!-- Buttons injected by JS -->
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="overlay hidden">
        <h1 id="winner-text">TEAM WINS!</h1>
        <p class="subtitle" id="scorer-text">Scored the golden goal.</p>
        <button onclick="resetToMenu()" style="width: 250px; border-color: #FFD700; color: #FFD700;">PLAY AGAIN</button>
    </div>

    <!-- Mobile controls -->
    <div id="joystick-zone">
        <div id="joystick-knob"></div>
    </div>
    <div id="shoot-btn">SHOOT</div>
</div>

<script>
    // --- THREE.JS SETUP ---
    const container = document.getElementById('game-container');
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0f1a); // Dark night sky
    
    // Fog removed as requested
    // scene.fog = new THREE.Fog(0x87CEEB, 300, 800);

    const camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 1, 1000);
    // Position camera for an angled, top-down view
    camera.position.set(0, 350, 300);
    camera.lookAt(0, 0, -50); 

    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
    renderer.setSize(container.clientWidth, container.clientHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    // Lights - Atmospheric Night Stadium Lighting
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.35); // Dimmer base light
    scene.add(ambientLight);

    const dirLight = new THREE.DirectionalLight(0xaabbff, 0.3); // Cool moonlight fill
    dirLight.position.set(100, 200, 100);
    scene.add(dirLight);

    // Create 4 Stadium Spotlights
    function createStadiumLight(x, z) {
        const spotLight = new THREE.SpotLight(0xffffff, 0.8, 800, Math.PI / 4, 0.4, 1);
        spotLight.position.set(x, 250, z);
        spotLight.lookAt(0, 0, 0);
        spotLight.castShadow = true;
        spotLight.shadow.mapSize.width = 1024;
        spotLight.shadow.mapSize.height = 1024;
        scene.add(spotLight);
        
        // Add a glowing bulb mesh at the light position
        const bulbGeo = new THREE.SphereGeometry(4, 16, 16);
        const bulbMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const bulb = new THREE.Mesh(bulbGeo, bulbMat);
        bulb.position.set(x, 250, z);
        scene.add(bulb);
    }

    createStadiumLight(-250, -300);
    createStadiumLight(250, -300);
    createStadiumLight(-250, 300);
    createStadiumLight(250, 300);

    // --- GAME LOGIC DIMENSIONS (Remains unchanged logically) ---
    const V_WIDTH = 400;
    const V_HEIGHT = 500;

    // Helper functions to map 2D Logic Space to 3D Render Space
    // 2D Origin (0,0) is top left. 3D Origin (0,0,0) is center field.
    function get3DX(logicalX) { return logicalX - (V_WIDTH / 2); }
    function get3DZ(logicalY) { return logicalY - (V_HEIGHT / 2); }

    // Resize Handler
    window.addEventListener('resize', () => {
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(container.clientWidth, container.clientHeight);
    });

    // --- SCENERY SETUP ---
    function buildField() {
        const fieldGroup = new THREE.Group();

        // Stadium Running Track (Underneath Grass)
        const trackGeo = new THREE.PlaneGeometry(V_WIDTH + 140, V_HEIGHT + 140);
        const trackMat = new THREE.MeshStandardMaterial({ color: 0x8B3A3A, roughness: 0.9, metalness: 0.1 }); 
        const track = new THREE.Mesh(trackGeo, trackMat);
        track.rotation.x = -Math.PI / 2;
        track.position.set(0, -0.5, 0);
        track.receiveShadow = true;
        fieldGroup.add(track);

        // Grass Base - Alternating Stripes (Upgraded Material)
        const stripeDepth = 50; 
        const grassMat1 = new THREE.MeshStandardMaterial({ color: 0x2e7d32, roughness: 1.0, metalness: 0.0 });
        const grassMat2 = new THREE.MeshStandardMaterial({ color: 0x276a2a, roughness: 1.0, metalness: 0.0 });
        
        for (let y = 0; y < V_HEIGHT; y += stripeDepth) {
            const mat = (y / stripeDepth) % 2 === 0 ? grassMat1 : grassMat2;
            const stripeGeo = new THREE.PlaneGeometry(V_WIDTH, stripeDepth);
            const stripe = new THREE.Mesh(stripeGeo, mat);
            stripe.rotation.x = -Math.PI / 2; // Lay flat
            // Center of stripe in logical Y
            const logicalCenterY = y + (stripeDepth / 2);
            stripe.position.set(0, 0, get3DZ(logicalCenterY));
            stripe.receiveShadow = true;
            fieldGroup.add(stripe);
        }

        // Field Lines (Glowing White)
        const lineMat = new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0x444444, roughness: 0.5 });
        const lineOffset = 0.5;

        // Center line
        const centerLineGeo = new THREE.BoxGeometry(V_WIDTH, 1, 3);
        const centerLine = new THREE.Mesh(centerLineGeo, lineMat);
        centerLine.position.set(0, lineOffset, 0);
        fieldGroup.add(centerLine);

        // Center circle
        const circleGeo = new THREE.TorusGeometry(40, 1.5, 4, 32);
        const centerCircle = new THREE.Mesh(circleGeo, lineMat);
        centerCircle.rotation.x = -Math.PI / 2;
        centerCircle.position.set(0, lineOffset, 0);
        fieldGroup.add(centerCircle);

        // Penalty Box
        const goalW = 120;
        const goalH = 60;
        const boxGeo = new THREE.BoxGeometry(goalW, 1, 3);
        const bottomLine = new THREE.Mesh(boxGeo, lineMat);
        // Position at logical top of field
        bottomLine.position.set(0, lineOffset, get3DZ(goalH)); 
        fieldGroup.add(bottomLine);

        const sideGeo = new THREE.BoxGeometry(3, 1, goalH);
        const leftLine = new THREE.Mesh(sideGeo, lineMat);
        leftLine.position.set(-goalW/2, lineOffset, get3DZ(goalH/2));
        fieldGroup.add(leftLine);

        const rightLine = new THREE.Mesh(sideGeo, lineMat);
        rightLine.position.set(goalW/2, lineOffset, get3DZ(goalH/2));
        fieldGroup.add(rightLine);

        // The Goal Net (Physical 3D object)
        const netGroup = new THREE.Group();
        const postGeo = new THREE.CylinderGeometry(2, 2, 30, 8);
        const postMat = new THREE.MeshLambertMaterial({ color: 0xdddddd });
        
        const leftPost = new THREE.Mesh(postGeo, postMat);
        leftPost.position.set(-goalW/2, 15, get3DZ(0));
        leftPost.castShadow = true;
        netGroup.add(leftPost);

        const rightPost = new THREE.Mesh(postGeo, postMat);
        rightPost.position.set(goalW/2, 15, get3DZ(0));
        rightPost.castShadow = true;
        netGroup.add(rightPost);

        const crossBarGeo = new THREE.CylinderGeometry(2, 2, goalW, 8);
        const crossBar = new THREE.Mesh(crossBarGeo, postMat);
        crossBar.rotation.z = Math.PI / 2;
        crossBar.position.set(0, 30, get3DZ(0));
        crossBar.castShadow = true;
        netGroup.add(crossBar);

        // Netting Back
        const netGeo = new THREE.BoxGeometry(goalW, 30, 15);
        const netMaterial = new THREE.MeshBasicMaterial({ 
            color: 0xffffff, 
            transparent: true, 
            opacity: 0.25, 
            wireframe: true 
        });
        const netting = new THREE.Mesh(netGeo, netMaterial);
        netting.position.set(0, 15, get3DZ(-7.5));
        netGroup.add(netting);

        fieldGroup.add(netGroup);

        // --- STADIUM STANDS (Upgraded to look more robust) ---
        const standMat = new THREE.MeshStandardMaterial({ color: 0x4a505e, roughness: 0.8 }); // Darker Concrete
        const seatMat = new THREE.MeshStandardMaterial({ color: 0x1E90FF, roughness: 0.6 }); // Blue seats
        
        const numTiers = 5;
        const tierWidth = 25;
        const tierHeight = 18;

        // Helper function to build tiered seating on one side
        function createStandSide(w, posX, posZ, rotationY) {
            const sideGroup = new THREE.Group();
            
            // Outer wall
            const wallGeo = new THREE.BoxGeometry(w, tierHeight * numTiers + 20, 10);
            const wall = new THREE.Mesh(wallGeo, standMat);
            wall.position.set(0, (tierHeight * numTiers + 20) / 2, (tierWidth * numTiers) + 5);
            wall.castShadow = true;
            wall.receiveShadow = true;
            sideGroup.add(wall);

            for (let i = 0; i < numTiers; i++) {
                // Concrete step
                const tierGeo = new THREE.BoxGeometry(w, tierHeight * (i + 1), tierWidth);
                const tier = new THREE.Mesh(tierGeo, standMat);
                tier.position.set(0, (tierHeight * (i + 1)) / 2, (tierWidth * i) + (tierWidth/2));
                tier.receiveShadow = true;
                tier.castShadow = true;
                sideGroup.add(tier);
                
                // Colored seats
                const seatGeo = new THREE.BoxGeometry(w - 10, 2, tierWidth - 6);
                const seats = new THREE.Mesh(seatGeo, seatMat);
                seats.position.set(0, (tierHeight * (i + 1)) + 1, (tierWidth * i) + (tierWidth/2));
                seats.receiveShadow = true;
                sideGroup.add(seats);
            }
            sideGroup.position.set(posX, 0, posZ);
            sideGroup.rotation.y = rotationY;
            return sideGroup;
        }

        // Add stands to all 4 sides, spaced out for the running track
        fieldGroup.add(createStandSide(V_HEIGHT + 140, -V_WIDTH/2 - 70, 0, -Math.PI/2)); // Left
        fieldGroup.add(createStandSide(V_HEIGHT + 140, V_WIDTH/2 + 70, 0, Math.PI/2));  // Right
        fieldGroup.add(createStandSide(V_WIDTH + 140, 0, V_HEIGHT/2 + 70, 0));         // Bottom
        fieldGroup.add(createStandSide(V_WIDTH + 140, 0, -V_HEIGHT/2 - 70, Math.PI));  // Top

        scene.add(fieldGroup);
    }
    
    buildField();

    // --- GAME DATA ---
    const TEAMS = [
        { id: 'BRA', name: 'Brazil', color1: '#FFDF00', color2: '#009C3B' },
        { id: 'ARG', name: 'Argentina', color1: '#75AADB', color2: '#FFFFFF' },
        { id: 'FRA', name: 'France', color1: '#002395', color2: '#FFFFFF' },
        { id: 'GER', name: 'Germany', color1: '#222222', color2: '#FFFFFF' },
        { id: 'USA', name: 'USA', color1: '#B31942', color2: '#0A3161' },
        { id: 'JPN', name: 'Japan', color1: '#000555', color2: '#FFFFFF' }
    ];

    let gameState = 'menu'; // menu, playing, scored, gameover
    let playerTeam = null;
    let entities = [];
    let ball = null;
    let goalie = null;
    let lastTouchedBy = null;

    // Tournament State
    let activeTeams = [];
    let safeTeams = [];
    let eliminatedTeams = [];
    let tournamentRound = 1;

    // Input state
    const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, w: false, a: false, s: false, d: false, ' ': false };
    let joystickVector = { x: 0, y: 0 };


    // --- CLASSES (Logic remains 2D, rendering added as 3D) ---

    class Entity {
        constructor(x, y, size, team, isAI = true, aiType = 'tactical') {
            this.x = x;
            this.y = y;
            this.size = size; 
            this.team = team;
            this.isAI = isAI;
            this.aiType = aiType; 
            this.vx = 0;
            this.vy = 0;
            this.speed = isAI ? 0.7 : 0.9; // Lowered base speeds
            this.friction = 0.8;
            this.isGoalie = false;
            this.wanderAngle = Math.random() * Math.PI * 2; 
            this.facingAngle = -Math.PI / 2; // Default facing towards the goal
            this.stealCooldown = 0; // Cooldown after getting tackled

            // Create 3D Mesh
            this.mesh = this.createMesh();
            scene.add(this.mesh);
            this.updateMeshPosition();
        }

        createMesh() {
            const group = new THREE.Group();
            
            // Shorts (Lower body - upgraded to Standard Material)
            const shortsGeo = new THREE.CylinderGeometry(5, 5, 8, 12);
            const shortsMat = new THREE.MeshStandardMaterial({ color: this.team.color2, roughness: 0.7 });
            const shorts = new THREE.Mesh(shortsGeo, shortsMat);
            shorts.position.y = 4;
            shorts.castShadow = true;
            group.add(shorts);

            // Shirt (Upper body - upgraded to Standard Material)
            const shirtGeo = new THREE.CylinderGeometry(5, 5, 10, 12);
            const shirtMat = new THREE.MeshStandardMaterial({ color: this.team.color1, roughness: 0.7 });
            const shirt = new THREE.Mesh(shirtGeo, shirtMat);
            shirt.position.y = 13;
            shirt.castShadow = true;
            group.add(shirt);

            // Head 
            const headGeo = new THREE.BoxGeometry(8, 8, 8);
            const headMat = new THREE.MeshStandardMaterial({ color: 0xFFC1CC, roughness: 0.5 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 22;
            head.castShadow = true;
            group.add(head);

            // Player Marker
            if (!this.isAI) {
                const markerGeo = new THREE.ConeGeometry(4, 8, 4);
                const markerMat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
                const marker = new THREE.Mesh(markerGeo, markerMat);
                marker.position.y = 35;
                marker.rotation.x = Math.PI; // point down
                group.add(marker);
            }

            return group;
        }

        update() {
            if (this.stealCooldown > 0) this.stealCooldown--;

            // Apply velocity
            this.x += this.vx;
            this.y += this.vy;
            
            // Friction
            this.vx *= this.friction;
            this.vy *= this.friction;

            // Boundaries
            if (this.x < this.size/2) this.x = this.size/2;
            if (this.x > V_WIDTH - this.size/2) this.x = V_WIDTH - this.size/2;
            if (this.y < this.size/2) this.y = this.size/2;
            if (this.y > V_HEIGHT - this.size/2) this.y = V_HEIGHT - this.size/2;

            if (this.isAI && !this.isGoalie && gameState === 'playing') {
                this.runAI();
            } else if (!this.isAI && gameState === 'playing') {
                this.handleInput();
            }

            this.checkBallCollision();
            this.updateMeshPosition();
        }

        updateMeshPosition() {
            this.mesh.position.set(get3DX(this.x), 0, get3DZ(this.y));
            
            // Make mesh face the direction of movement
            if (Math.abs(this.vx) > 0.1 || Math.abs(this.vy) > 0.1) {
                this.facingAngle = Math.atan2(this.vy, this.vx); // Update logical facing angle
                // In ThreeJS top-down, Z is up/down on screen. Atan2 calculates angle correctly.
                this.mesh.rotation.y = Math.atan2(this.vx, this.vy);
            }
        }

        handleInput() {
            let dx = 0; let dy = 0;
            if (keys.ArrowUp || keys.w) dy -= 1;
            if (keys.ArrowDown || keys.s) dy += 1;
            if (keys.ArrowLeft || keys.a) dx -= 1;
            if (keys.ArrowRight || keys.d) dx += 1;

            if (joystickVector.x !== 0 || joystickVector.y !== 0) {
                dx = joystickVector.x;
                dy = joystickVector.y;
            }

            // Normalize
            if (dx !== 0 || dy !== 0) {
                const len = Math.sqrt(dx*dx + dy*dy);
                let currentSpeed = this.speed;
                // Slow down by 40% when dribbling the ball
                if (ball && ball.possessedBy === this) {
                    currentSpeed *= 0.6; 
                }
                this.vx += (dx / len) * currentSpeed * 0.4;
                this.vy += (dy / len) * currentSpeed * 0.4;
            }

            // Shoot mechanics
            if (keys[' ']) {
                shootBall(this);
                keys[' '] = false; // Prevent holding spacebar to auto-shoot
            }
        }

        runAI() {
            if (!ball) return;
            
            const goalX = V_WIDTH / 2;
            const goalY = 20;

            // Dribbling and Shooting Logic
            if (ball.possessedBy === this) {
                let dxToGoal = goalX - this.x;
                let dyToGoal = goalY - this.y;
                let distToGoal = Math.sqrt(dxToGoal*dxToGoal + dyToGoal*dyToGoal);
                
                if (distToGoal < 100) {
                    // Turn to face the goal and shoot
                    this.facingAngle = Math.atan2(dyToGoal, dxToGoal);
                    shootBall(this);
                    return;
                }
                
                // Drive towards the goal
                if (distToGoal > 0) {
                    this.vx += (dxToGoal / distToGoal) * this.speed * 0.35;
                    this.vy += (dyToGoal / distToGoal) * this.speed * 0.35;
                }
                return; // Skip chasing logic
            }

            let dx = ball.x - this.x;
            let dy = ball.y - this.y;
            const distToBall = Math.sqrt(dx*dx + dy*dy);

            let targetX, targetY;

            this.wanderAngle += (Math.random() - 0.5) * 0.3;
            const wanderX = Math.cos(this.wanderAngle) * 0.6;
            const wanderY = Math.sin(this.wanderAngle) * 0.6;

            if (this.aiType === 'aggressive') {
                targetX = dx;
                targetY = dy;
            } else if (this.aiType === 'camper') {
                if (distToBall < 150) {
                    targetX = dx;
                    targetY = dy;
                } else {
                    targetX = ball.x - this.x;
                    targetY = (V_HEIGHT * 0.65) - this.y;
                }
            } else {
                if (this.y < ball.y - 5) {
                    let sideOffset = this.x < ball.x ? -35 : 35; 
                    targetX = (ball.x + sideOffset) - this.x;
                    targetY = (ball.y + 25) - this.y;
                } else {
                    targetX = dx;
                    targetY = dy;
                }
            }

            const len = Math.sqrt(targetX*targetX + targetY*targetY);
            if (len > 0) {
                let moveX = (targetX / len) + wanderX;
                let moveY = (targetY / len) + wanderY;
                const moveLen = Math.sqrt(moveX*moveX + moveY*moveY);
                
                let currentSpeed = this.speed;
                // AI also slows down when dribbling the ball
                if (ball && ball.possessedBy === this) {
                    currentSpeed *= 0.6;
                }
                
                this.vx += (moveX / moveLen) * currentSpeed * 0.25;
                this.vy += (moveY / moveLen) * currentSpeed * 0.25;
            }
        }

        checkBallCollision() {
            if (!ball) return;
            let distX = Math.abs(ball.x - this.x);
            let distY = Math.abs(ball.y - this.y);

            if (distX > (this.size/2 + ball.radius)) return;
            if (distY > (this.size/2 + ball.radius)) return;

            if (distX <= (this.size/2)) { resolveCollision(this, ball); return; } 
            if (distY <= (this.size/2)) { resolveCollision(this, ball); return; }

            let dx = distX - this.size/2;
            let dy = distY - this.size/2;
            if (dx*dx + dy*dy <= (ball.radius*ball.radius)) {
                resolveCollision(this, ball);
            }
        }
    }

    class Goalie extends Entity {
        constructor() {
            // Team object mimics formatting but represents goalie styling
            super(V_WIDTH/2, 60, 24, {color1: '#FFA500', color2: '#222222'}, true);
            this.isGoalie = true;
            this.speed = 1.35; // Slightly faster to handle charging
            this.startY = 60;
        }

        createMesh() {
            const group = new THREE.Group();
            
            // Make goalie wider and blockier
            const bodyGeo = new THREE.BoxGeometry(16, 16, 10);
            const bodyMat = new THREE.MeshLambertMaterial({ color: 0xFFA500 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 8;
            body.castShadow = true;
            group.add(body);

            // Gloves
            const gloveGeo = new THREE.BoxGeometry(4, 6, 6);
            const gloveMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
            
            const leftGlove = new THREE.Mesh(gloveGeo, gloveMat);
            leftGlove.position.set(-10, 8, 2);
            leftGlove.castShadow = true;
            group.add(leftGlove);

            const rightGlove = new THREE.Mesh(gloveGeo, gloveMat);
            rightGlove.position.set(10, 8, 2);
            rightGlove.castShadow = true;
            group.add(rightGlove);

            return group;
        }

        runAI() {
            if (!ball) return;
            
            let targetX = ball.x;
            const goalLeft = V_WIDTH/2 - 50;
            const goalRight = V_WIDTH/2 + 50;
            
            // Clamp X to goal area
            if (targetX < goalLeft) targetX = goalLeft;
            if (targetX > goalRight) targetX = goalRight;

            // Come off the line to block if ball is near the penalty box
            let targetY = this.startY;
            if (ball.y < 160 && ball.x > goalLeft - 40 && ball.x < goalRight + 40) {
                targetY = Math.max(20, ball.y - 15); // Charge the ball, but don't go into the net
                if (targetY > 120) targetY = 120; // Don't go too far out
            }

            let dx = targetX - this.x;
            let dy = targetY - this.y;
            
            if (Math.abs(dx) > 5) {
                this.vx += Math.sign(dx) * this.speed * 0.4;
            } else {
                this.vx *= 0.5;
            }

            if (Math.abs(dy) > 5) {
                this.vy += Math.sign(dy) * this.speed * 0.4;
            } else {
                this.vy *= 0.5;
            }
        }
    }

    class Ball {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.radius = 6;
            this.vx = 0;
            this.vy = 0;
            this.friction = 0.96;
            this.possessedBy = null; // Who is dribbling the ball
            this.possessionCooldown = 0; // Delay before someone can pick it up again
            
            // 3D Mesh (Low-poly Icosahedron makes a nice soccer ball)
            const ballGeo = new THREE.IcosahedronGeometry(this.radius, 1);
            const ballMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
            this.mesh = new THREE.Mesh(ballGeo, ballMat);
            this.mesh.castShadow = true;
            scene.add(this.mesh);

            this.updateMeshPosition();
        }

        update() {
            if (this.possessionCooldown > 0) this.possessionCooldown--;

            if (this.possessedBy) {
                // Ball is being dribbled, stick it to the front of the player
                const offset = 14; // Distance in front of player
                this.x = this.possessedBy.x + Math.cos(this.possessedBy.facingAngle) * offset;
                this.y = this.possessedBy.y + Math.sin(this.possessedBy.facingAngle) * offset;
                
                // Match velocity for visual smoothness
                this.vx = this.possessedBy.vx;
                this.vy = this.possessedBy.vy;
            } else {
                // Standard physics when not possessed
                this.x += this.vx;
                this.y += this.vy;
                
                this.vx *= this.friction;
                this.vy *= this.friction;

                // Bounce walls
                if (this.x < this.radius) { this.x = this.radius; this.vx *= -0.8; }
                if (this.x > V_WIDTH - this.radius) { this.x = V_WIDTH - this.radius; this.vx *= -0.8; }
                if (this.y > V_HEIGHT - this.radius) { this.y = V_HEIGHT - this.radius; this.vy *= -0.8; }
                
                // Goal Area
                const goalLeft = V_WIDTH/2 - 60;
                const goalRight = V_WIDTH/2 + 60;
                
                if (this.y < this.radius) {
                    if (this.x > goalLeft && this.x < goalRight) {
                        // GOAL SCORED
                        if (gameState === 'playing') {
                            handleGoal();
                        }
                    } else {
                        this.y = this.radius; 
                        this.vy *= -0.8;
                    }
                }
            }

            this.updateMeshPosition();
        }

        updateMeshPosition() {
            this.mesh.position.set(get3DX(this.x), this.radius, get3DZ(this.y));
            // Simulate rolling
            this.mesh.rotation.x += this.vy * 0.1;
            this.mesh.rotation.z -= this.vx * 0.1;
        }
    }

    // --- PHYSICS HELPERS ---
    function shootBall(entity) {
        if (!ball || ball.possessedBy !== entity) return;
        
        ball.possessedBy = null;
        ball.possessionCooldown = 20; // Prevent instant re-grabbing
        
        const shotPower = 8.5; // Blast speed
        ball.vx = Math.cos(entity.facingAngle) * shotPower + entity.vx * 0.5;
        ball.vy = Math.sin(entity.facingAngle) * shotPower + entity.vy * 0.5;
    }

    function resolveCollision(entity, ball) {
        if (ball.possessionCooldown > 0) return;
        if (entity.stealCooldown > 0) return;
        if (ball.possessedBy === entity) return; // Already holding it

        if (!entity.isGoalie) {
            // Pick up the ball!
            lastTouchedBy = entity.team;
            ball.possessedBy = entity;
        } else {
            // Goalie logic: clear the ball downfield instantly
            ball.possessedBy = null;
            ball.possessionCooldown = 15;
            ball.vy = 6;
            ball.vx = (Math.random() - 0.5) * 4;
        }
    }


    // --- GAME LOGIC ---
    function initMenu() {
        const grid = document.getElementById('team-selection');
        grid.innerHTML = '';
        
        TEAMS.forEach(team => {
            const btn = document.createElement('button');
            btn.innerHTML = team.name;
            btn.style.borderColor = team.color1;
            btn.onclick = () => startGame(team);
            grid.appendChild(btn);
        });

        if ('ontouchstart' in window || navigator.maxTouchPoints > 0) {
            document.getElementById('joystick-zone').style.display = 'block';
            document.getElementById('shoot-btn').style.display = 'block';
            setupJoystick();
        }
    }

    function clearEntities() {
        entities.forEach(e => scene.remove(e.mesh));
        if (ball) scene.remove(ball.mesh);
        entities = [];
        ball = null;
    }

    function startGame(selectedTeam) {
        playerTeam = selectedTeam;
        document.getElementById('menu-screen').classList.add('hidden');
        document.getElementById('game-over-screen').classList.add('hidden');
        
        // Setup initial tournament state
        const opponents = TEAMS.filter(t => t.id !== playerTeam.id)
                               .sort(() => 0.5 - Math.random())
                               .slice(0, 3);
        
        activeTeams = [playerTeam, ...opponents];
        safeTeams = [];
        eliminatedTeams = [];
        tournamentRound = 1;
        
        // Pan camera down dynamically at start (optional flair)
        camera.position.set(0, 450, 400);
        
        startRound();
    }

    function startRound() {
        clearEntities();
        
        const aiPersonalities = ['aggressive', 'camper', 'tactical'];

        // Spawn only the active teams for this round
        activeTeams.forEach((team, i) => {
            const isPlayer = (team.id === playerTeam.id);
            const x = (V_WIDTH / (activeTeams.length + 1)) * (i + 1);
            entities.push(new Entity(x, V_HEIGHT - 100, 20, team, !isPlayer, aiPersonalities[i % 3]));
        });

        // Add Goalie
        goalie = new Goalie();
        entities.push(goalie);

        // Add Ball
        ball = new Ball(V_WIDTH/2, V_HEIGHT/2);
        lastTouchedBy = null;

        document.getElementById('status-text').innerText = `ROUND ${tournamentRound}\n${activeTeams.length} TEAMS FIGHTING`;
        
        gameState = 'playing';
    }

    function handleGoal() {
        let scoringTeam = null;
        if (lastTouchedBy) {
            scoringTeam = activeTeams.find(t => t.id === lastTouchedBy.id);
        }
        
        // Fallback in case of neutral goal (e.g. goalie kicks it in)
        if (!scoringTeam) {
            scoringTeam = activeTeams[Math.floor(Math.random() * activeTeams.length)];
        }

        gameState = 'scored'; // Pause game physics
        
        // Move team to safe list
        activeTeams = activeTeams.filter(t => t.id !== scoringTeam.id);
        safeTeams.push(scoringTeam);

        if (activeTeams.length === 1) {
            // Only one team left, they are eliminated!
            const eliminated = activeTeams[0];
            eliminatedTeams.push(eliminated);
            document.getElementById('status-text').innerText = `${scoringTeam.name} IS SAFE!\n\n${eliminated.name} IS ELIMINATED!`;
            
            if (safeTeams.length === 1) {
                // Tournament over, we have a sole survivor/winner
                setTimeout(() => triggerGameOver(safeTeams[0]), 2500);
            } else {
                // Next tournament round
                tournamentRound++;
                activeTeams = [...safeTeams];
                safeTeams = [];
                setTimeout(startRound, 3000);
            }
        } else {
            // Round continues with remaining active teams
            document.getElementById('status-text').innerText = `${scoringTeam.name} IS SAFE!\n\n${activeTeams.length} TEAMS REMAINING.`;
            setTimeout(startRound, 2000);
        }
    }

    function triggerGameOver(winnerTeam) {
        gameState = 'gameover';
        
        const winnerScreen = document.getElementById('game-over-screen');
        const winnerText = document.getElementById('winner-text');
        const scorerText = document.getElementById('scorer-text');
        
        winnerScreen.classList.remove('hidden');
        
        winnerText.innerText = `${winnerTeam.name} WINS!`;
        winnerText.style.color = winnerTeam.color1;
        winnerText.style.textShadow = `4px 4px 0 ${winnerTeam.color2}`;
        
        if (winnerTeam.id === playerTeam.id) {
            scorerText.innerText = "You are the ultimate survivor!";
        } else {
            scorerText.innerText = "You were eliminated.";
        }
    }

    function resetToMenu() {
        gameState = 'menu';
        document.getElementById('game-over-screen').classList.add('hidden');
        document.getElementById('menu-screen').classList.remove('hidden');
        document.getElementById('status-text').innerText = "";
        clearEntities();
    }

    // --- MAIN RENDER LOOP ---
    function gameLoop() {
        if (gameState === 'playing') {
            entities.forEach(e => e.update());
            if (ball) ball.update();

            // Resolve overlapping entities
            for (let i = 0; i < entities.length; i++) {
                for (let j = i + 1; j < entities.length; j++) {
                    let e1 = entities[i];
                    let e2 = entities[j];
                    let dx = e2.x - e1.x;
                    let dy = e2.y - e1.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    let minDist = (e1.size + e2.size)/2;
                    
                    if (dist < minDist && dist > 0) {
                        let overlap = minDist - dist;
                        let nx = dx/dist;
                        let ny = dy/dist;
                        
                        e1.x -= nx * overlap * 0.1;
                        e1.y -= ny * overlap * 0.1;
                        e2.x += nx * overlap * 0.1;
                        e2.y += ny * overlap * 0.1;

                        // Stealing Mechanics
                        if (ball) {
                            if (ball.possessedBy === e1 && e2.stealCooldown === 0 && !e2.isGoalie) {
                                ball.possessedBy = e2;
                                e1.stealCooldown = 60; // Knocked away, 1 second cooldown
                                lastTouchedBy = e2.team;
                            } else if (ball.possessedBy === e2 && e1.stealCooldown === 0 && !e1.isGoalie) {
                                ball.possessedBy = e1;
                                e2.stealCooldown = 60; // Knocked away, 1 second cooldown
                                lastTouchedBy = e1.team;
                            }
                        }
                    }
                }
            }

            // Slowly animate camera to final playing position
            camera.position.y += (350 - camera.position.y) * 0.05;
            camera.position.z += (300 - camera.position.z) * 0.05;
            camera.lookAt(0, 0, -50);
        } else {
            // Static camera view for menu
            camera.position.set(0, 350, 300);
            camera.lookAt(0, 0, -50);
        }

        renderer.render(scene, camera);
        requestAnimationFrame(gameLoop);
    }

    // --- INPUT HANDLING ---
    window.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = true; });
    window.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key)) keys[e.key] = false; });

    function setupJoystick() {
        const zone = document.getElementById('joystick-zone');
        const knob = document.getElementById('joystick-knob');
        let active = false;
        let center = {x:0, y:0};
        const maxDist = 40;

        zone.addEventListener('touchstart', (e) => {
            active = true;
            const rect = zone.getBoundingClientRect();
            center = { x: rect.left + rect.width/2, y: rect.top + rect.height/2 };
            updateKnob(e.touches[0]);
        }, {passive: false});

        zone.addEventListener('touchmove', (e) => {
            if (!active) return;
            e.preventDefault(); 
            updateKnob(e.touches[0]);
        }, {passive: false});

        const resetJoy = () => {
            active = false;
            joystickVector = {x: 0, y: 0};
            knob.style.transform = `translate(-50%, -50%)`;
        };
        
        zone.addEventListener('touchend', resetJoy);
        zone.addEventListener('touchcancel', resetJoy);

        // Mobile Shoot Button
        const shootBtn = document.getElementById('shoot-btn');
        shootBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            keys[' '] = true;
        }, {passive: false});
        
        shootBtn.addEventListener('touchend', (e) => {
            e.preventDefault();
            keys[' '] = false;
        });

        function updateKnob(touch) {
            let dx = touch.clientX - center.x;
            let dy = touch.clientY - center.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            
            if (dist > maxDist) {
                dx = (dx/dist) * maxDist;
                dy = (dy/dist) * maxDist;
            }
            
            knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
            
            if (dist > 5) {
                joystickVector = { x: dx/maxDist, y: dy/maxDist };
            } else {
                joystickVector = {x: 0, y: 0};
            }
        }
    }

    // Start
    initMenu();
    requestAnimationFrame(gameLoop);

</script>
</body>
</html>
